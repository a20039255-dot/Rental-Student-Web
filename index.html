<div class="space-y-4">
    <div>
        <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">學生姓名</label>
        <input type="text" id="studentName" class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl text-white outline-none" placeholder="例如：王小明">
    </div>
    <div>
        <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">學生學號</label>
        <input type="text" id="studentId" class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl text-white outline-none" placeholder="例如：D1101234">
    </div>
    <div>
        <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">所屬單位 (系會/社團/個人)</label>
        <input type="text" id="studentOrg" class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl text-white outline-none" placeholder="例如：資管系學會">
    </div>
    
    <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">
        進入系統
    </button>
</div>

<script>
    function login() {
        const name = document.getElementById('studentName').value.trim();
        const id = document.getElementById('studentId').value.trim();
        const org = document.getElementById('studentOrg').value.trim(); // 🌟 抓取單位

        if(!name || !id || !org) return alert("請填寫所有欄位！");

        // 存入 localStorage
        localStorage.setItem('studentName', name);
        localStorage.setItem('studentId', id);
        localStorage.setItem('studentOrg', org); // 🌟 存入單位
        
        window.location.href = 'student.html';
    }
</script>
