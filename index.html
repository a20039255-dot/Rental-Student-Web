<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備借用系統 - 學生登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-md border border-slate-100">
        <h2 class="text-2xl font-black text-slate-800 mb-6">學生借用登入</h2>
        <div class="space-y-4">
            <input type="text" id="sName" placeholder="真實姓名" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
            <input type="text" id="sOrg" placeholder="單位 (如：資管系會)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
            <input type="text" id="sId" maxlength="9" placeholder="學號 (9 碼)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-mono">
            <input type="tel" id="sPhone" maxlength="10" placeholder="電話 (10 碼)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-mono">
            <button onclick="login()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">開始借用</button>
        </div>
    </div>
    <script>
        function login() {
            const name = document.getElementById('sName').value.trim();
            const org = document.getElementById('sOrg').value.trim();
            const id = document.getElementById('sId').value.trim();
            const phone = document.getElementById('sPhone').value.trim();

            if (!name || !org || id.length !== 9 || phone.length !== 10) {
                return alert("請檢查：\n1. 所有欄位必填\n2. 學號須為 9 碼\n3. 電話須為 10 碼");
            }
            localStorage.setItem('studentName', name);
            localStorage.setItem('studentOrg', org);
            localStorage.setItem('studentId', id);
            localStorage.setItem('studentPhone', phone);
            window.location.href = 'student.html';
        }
    </script>
</body>
</html>
