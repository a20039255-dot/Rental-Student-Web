<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生會設備系統 - 登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-[400px] text-center">
        <div class="text-4xl mb-4">📦</div>
        <h1 class="text-2xl font-bold text-blue-600 mb-6">學生會設備系統</h1>
        
        <div class="space-y-4 text-left">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">學號</label>
                <input type="text" id="studentId" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如: 409431XX">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">真實姓名</label>
                <input type="text" id="studentName" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="請輸入本名">
            </div>
            <button onclick="studentLogin()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 mt-6 shadow-md">
                進入借用系統
            </button>
            <div class="text-center mt-4">
                <a href="#" class="text-sm text-gray-400 hover:text-gray-600 underline">我是值班幹部</a>
            </div>
        </div>
    </div>

    <script>
        function studentLogin() {
            const id = document.getElementById('studentId').value;
            const name = document.getElementById('studentName').value;
            
            if(!id || !name) {
                alert("請輸入學號與姓名！");
                return;
            }
            
            // 將學號姓名存在瀏覽器記憶體，帶到下一個頁面
            localStorage.setItem('studentId', id);
            localStorage.setItem('studentName', name);
            
            console.log("登入成功，準備跳轉...");
            window.location.href = 'student.html';
        }
    </script>
</body>
</html>
