<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備部數位系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased">
    <header class="bg-slate-800 border-b border-slate-700 shadow-md px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <span class="text-2xl">📦</span>
            <div>
                <h1 class="text-lg font-black text-white">設備部數位系統</h1>
                <p class="text-xs text-slate-400" id="userInfo"></p>
            </div>
        </div>
        <button onclick="logout()" class="text-sm font-bold text-slate-300 hover:text-white bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition">登出</button>
    </header>

    <main class="p-6 max-w-5xl mx-auto pb-24">
        <h2 class="text-sm font-bold text-slate-400 mb-4 flex items-center gap-2">🔎 可借用設備清單</h2>
        <div id="equipmentList" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <p class="text-slate-500 text-sm col-span-full">系統載入中...</p>
        </div>
    </main>

    <div id="cartPanel" class="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 p-4 shadow-2xl hidden z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div id="cartItems" class="text-sm font-bold text-slate-300 flex-1 flex flex-wrap gap-2"></div>
            <button onclick="submitBorrow()" class="bg-blue-600 hover:bg-blue-500 text-white font-black px-6 py-3 rounded-xl transition shadow-lg whitespace-nowrap ml-4">送出申請</button>
        </div>
    </div>

    <script>
        // 🚨 請換成您的 Cloud Run 網址
        const API_URL = "https://student-api-174932950003.asia-east1.run.app"; 
        let cart = {};

        window.onload = () => {
            const sid = localStorage.getItem('student_id');
            const sname = localStorage.getItem('student_name');
            if (!sid || !sname) return window.location.href = 'index.html';
            document.getElementById('userInfo').innerText = `${sname} (${sid})`;
            loadEquipments();
        };

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function loadEquipments() {
            fetch(`${API_URL}/equipments`).then(res => res.json()).then(data => {
                const container = document.getElementById('equipmentList');
                container.innerHTML = '';
                for (const key in data) {
                    const item = data[key];
                    let limit = parseInt(item['單次借用上限']) || parseInt(item['借用上限']);
                    if (isNaN(limit) || limit <= 0) limit = 1; 
                    const stock = parseInt(item['剩餘數量']) || 0;
                    const realMax = Math.min(stock, limit);
                    
                    let options = realMax > 0 
                        ? Array.from({length: realMax}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('') 
                        : `<option value="0">已領完</option>`;
                    
                    container.innerHTML += `
                        <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-md flex flex-col justify-between hover:border-blue-500 hover:shadow-lg transition h-full">
                            <div class="mb-4">
                                <h3 class="text-sm font-black text-white leading-snug">${item['設備名稱']}</h3>
                                <p class="text-[11px] text-slate-400 mt-1">可用庫存 <span class="${stock > 0 ? 'text-blue-400' : 'text-rose-400'} font-bold">${stock}</span></p>
                            </div>
                            <div class="flex items-center gap-2 mt-auto">
                                <select id="qty-${key}" class="bg-slate-700 text-white text-xs font-bold p-2.5 rounded-xl outline-none border border-slate-600 flex-1">${options}</select>
                                <button onclick="addToCart('${key}', '${item['設備名稱']}', ${limit}, ${stock})" 
                                    class="bg-blue-600 text-white text-[10px] font-black px-4 py-3 rounded-xl transition active:scale-95 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500"
                                    ${stock <= 0 ? 'disabled' : ''}>+ 加入</button>
                            </div>
                        </div>`;
                }
            }).catch(() => {
                document.getElementById('equipmentList').innerHTML = `<p class="text-rose-400 text-sm col-span-full">無法連線到伺服器，請稍後再試</p>`;
            });
        }

        function addToCart(id, name, limit, stock) {
            const qty = parseInt(document.getElementById(`qty-${id}`).value);
            if (qty <= 0) return;
            cart[id] = { name, qty };
            updateCartUI();
        }

        function updateCartUI() {
            const panel = document.getElementById('cartPanel');
            const itemsDiv = document.getElementById('cartItems');
            const keys = Object.keys(cart);
            if (keys.length === 0) {
                panel.classList.add('hidden');
                return;
            }
            panel.classList.remove('hidden');
            itemsDiv.innerHTML = keys.map(k => `<span class="bg-slate-900 text-blue-300 border border-blue-900 px-3 py-1 rounded-lg">${cart[k].name} x${cart[k].qty}</span>`).join('');
        }

        function submitBorrow() {
            const sid = localStorage.getItem('student_id');
            const sname = localStorage.getItem('student_name');
            const items = Object.keys(cart).map(k => ({ id: k, name: cart[k].name, qty: cart[k].qty }));
            
            fetch(`${API_URL}/borrow_batch`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "租借人員學號": sid, "租借人員姓名": sname, "設備清單": items })
            }).then(res => res.json()).then(data => {
                if (data.成功) {
                    alert('申請成功！系統已通知設備部審核。');
                    cart = {};
                    updateCartUI();
                    loadEquipments();
                } else {
                    alert('申請失敗：' + data.訊息);
                }
            });
        }
    </script>
</body>
</html>
