<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備借用系統 - 審核制</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #cartDrawer { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans relative min-h-screen">

    <div class="max-w-3xl mx-auto pb-20">
        <div class="bg-blue-600 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-2xl p-6 shadow-lg mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold flex items-center"><span class="text-3xl mr-3">📦</span> 設備借用</h1>
                <p class="mt-2 text-blue-100 text-sm" id="userInfo">載入中...</p>
            </div>
            <button onclick="logout()" class="bg-blue-800 hover:bg-black px-5 py-2 rounded-lg text-sm font-bold shadow transition text-white">登出</button>
        </div>

        <div class="bg-amber-50 border-l-4 border-amber-500 p-4 mb-6 rounded-r-xl shadow-sm">
            <div class="flex">
                <div class="flex-shrink-0 text-amber-500">⚠️</div>
                <div class="ml-3">
                    <p class="text-sm text-amber-800 font-bold">
                        申請送出不代表預留成功，以幹部審核順序為準。
                    </p>
                </div>
            </div>
        </div>
<div id="statusSection" class="mb-6 hidden">
    <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-bold text-gray-700 flex items-center">
            <span class="mr-2">⏳</span> 我的申請進度
        </h2>
        <button onclick="fetchMyStatus()" class="text-xs text-blue-600 font-bold hover:underline">整理進度</button>
    </div>
    <div id="statusList" class="space-y-3">
        </div>
</div>
        <div class="bg-white rounded-2xl shadow-md p-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center"><span class="mr-2">🔍</span> 可借用設備</h2>
            <div id="equipmentList" class="space-y-4">
                <div class="text-center text-gray-400 py-10">
                    <p class="animate-pulse font-medium">📡 正在同步雲端庫存...</p>
                </div>
            </div>
        </div>
    </div>

    <button onclick="toggleCart()" class="fixed bottom-8 right-8 bg-gray-900 hover:bg-black text-white p-4 rounded-full shadow-2xl transition transform hover:scale-105 z-40 flex items-center gap-2">
        <span class="text-2xl">🛒</span>
        <span id="cartBadge" class="bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full hidden">0</span>
    </button>

    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex justify-end">
        <div id="cartDrawer" class="bg-white w-full max-w-md h-full shadow-2xl flex flex-col transform translate-x-full">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-xl font-bold text-gray-800">你的借用申請清單</h2>
                <button onclick="toggleCart()" class="text-gray-400 hover:text-red-500 text-2xl font-bold">&times;</button>
            </div>
            <div id="cartItems" class="p-6 flex-1 overflow-y-auto space-y-4"></div>
            <div class="p-6 border-t bg-gray-50">
                <button onclick="submitCheckout()" id="checkoutBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition disabled:bg-gray-300">
                    送出借用申請
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";
        let cart = [];

        window.onload = function() {
            const name = localStorage.getItem('studentName');
            const id = localStorage.getItem('studentId');
            if(name && id) {
                document.getElementById('userInfo').innerText = `同學你好：${name} (${id})`;
            } else {
                window.location.href = 'index.html';
            }
            loadEquipments();
            loadCartFromStorage();
        };

        function loadEquipments() {
            fetch(`${API_URL}/equipments`)
                .then(res => res.json())
                .then(data => renderEquipments(data))
                .catch(err => {
                    document.getElementById('equipmentList').innerHTML = `<p class="text-red-500 text-center font-bold">連線失敗</p>`;
                });
        }

        function renderEquipments(data) {
            const listContainer = document.getElementById('equipmentList');
            listContainer.innerHTML = '';

            for (const key in data) {
                const item = data[key];
                const realLimit = Math.min(item.剩餘數量, item.借用上限);
                
                let optionsHTML = '';
                if (realLimit > 0) {
                    for (let i = 1; i <= realLimit; i++) optionsHTML += `<option value="${i}">${i}</option>`;
                } else {
                    optionsHTML = `<option value="0">無庫存</option>`;
                }

                const card = document.createElement('div');
                card.className = "flex items-center justify-between p-5 border border-gray-100 rounded-xl hover:shadow-md transition bg-white";
                card.innerHTML = `
                    <div>
                        <h3 class="text-lg font-bold text-gray-800">${item.設備名稱}</h3>
                        <p class="text-sm text-gray-500 mt-1">
                            可用庫存: <span class="${item.剩餘數量 > 0 ? 'text-blue-600 font-bold' : 'text-red-500'}">${item.剩餘數量}</span> 
                        </p>
                    </div>
                    <div class="flex items-center gap-3">
                        <select class="border border-gray-200 rounded-lg p-2 bg-gray-50" id="qty-${key}">${optionsHTML}</select>
                        <button onclick="addToCart('${key}', '${item.設備名稱}', ${item.借用上限}, ${item.剩餘數量})" 
                            class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2 rounded-lg shadow-sm transition disabled:bg-gray-300" 
                            ${item.剩餘數量 === 0 ? 'disabled' : ''}>
                            + 申請
                        </button>
                    </div>
                `;
                listContainer.appendChild(card);
            }
        }

        function addToCart(id, name, limit, stock) {
            const qty = parseInt(document.getElementById(`qty-${id}`).value);
            if (qty <= 0) return;
            const idx = cart.findIndex(i => i.id === id);
            const currentInCart = idx !== -1 ? cart[idx].qty : 0;
            const totalWanted = currentInCart + qty;

            if (totalWanted > limit) return alert(`超過單次借用上限 (${limit})！`);
            if (totalWanted > stock) return alert(`超過可用庫存 (${stock})！`);

            if (idx !== -1) {
                cart[idx].qty = totalWanted;
            } else {
                cart.push({ id, name, qty });
            }
            saveCartToStorage();
            updateCartUI();
        }

        function updateCartItemQty(id, change) {
            const idx = cart.findIndex(i => i.id === id);
            if (idx === -1) return;
            const newQty = cart[idx].qty + change;
            if (newQty <= 0) {
                if(confirm("要移除此項申請嗎？")) removeFromCart(id);
            } else {
                cart[idx].qty = newQty;
                saveCartToStorage();
                updateCartUI();
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            saveCartToStorage();
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cartBadge');
            const container = document.getElementById('cartItems');
            const btn = document.getElementById('checkoutBtn');
            badge.innerText = cart.length;
            cart.length > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
            btn.disabled = cart.length === 0;
            container.innerHTML = cart.length === 0 ? `<p class="text-center text-gray-400 mt-10">申請清單是空的</p>` : '';
            
            cart.forEach(item => {
                container.insertAdjacentHTML('beforeend', `
                    <div class="flex justify-between items-center border-b border-gray-100 pb-4 mb-4 text-white">
                        <div class="flex-1">
                            <p class="font-bold text-gray-800">${item.name}</p>
                            <div class="flex items-center mt-2 bg-gray-100 w-fit rounded-lg p-1">
                                <button onclick="updateCartItemQty('${item.id}', -1)" class="w-8 h-8 bg-white rounded shadow text-red-500 font-bold">-</button>
                                <span class="px-4 font-mono font-bold text-gray-700">${item.qty}</span>
                                <button onclick="updateCartItemQty('${item.id}', 1)" class="w-8 h-8 bg-white rounded shadow text-blue-500 font-bold">+</button>
                            </div>
                        </div>
                        <button onclick="removeFromCart('${item.id}')" class="text-gray-300 hover:text-red-500 transition ml-4">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                `);
            });
        }

        function submitCheckout() {
            const sid = localStorage.getItem('studentId');
            const sname = localStorage.getItem('studentName');
            const btn = document.getElementById('checkoutBtn');

            const payload = {
                "租借人員學號": sid,
                "租借人員姓名": sname,
                "設備清單": cart
            };

            btn.innerText = "⏳ 正在傳送申請...";
            btn.disabled = true;

            fetch(`${API_URL}/borrow_batch`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.成功) {
                    alert("✅ 申請已送出！\n請靜候幹部審核，審核通過後即可至櫃檯領取。");
                    cart = [];
                    saveCartToStorage();
                    updateCartUI();
                    toggleCart();
                    loadEquipments();
                } else {
                    alert("❌ 申請失敗：" + data.訊息);
                }
            })
            .catch(err => alert("連線異常"))
            .finally(() => {
                btn.innerText = "送出借用申請";
                btn.disabled = false;
            });
        }

        function toggleCart() {
            const m = document.getElementById('cartModal');
            const d = document.getElementById('cartDrawer');
            if(m.classList.contains('hidden')) {
                m.classList.remove('hidden');
                setTimeout(() => d.classList.remove('translate-x-full'), 10);
            } else {
                d.classList.add('translate-x-full');
                setTimeout(() => m.classList.add('hidden'), 300);
            }
        }
        function saveCartToStorage() { localStorage.setItem('shoppingCart', JSON.stringify(cart)); }
        function loadCartFromStorage() {
            const s = localStorage.getItem('shoppingCart');
            if(s) { cart = JSON.parse(s); updateCartUI(); }
        }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
