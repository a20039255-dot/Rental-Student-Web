<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備借用系統 - 學生登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 md:p-10 transition-all">
        
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-blue-50 rounded-2xl mb-4">
                <span class="text-4xl">🎓</span>
            </div>
            <h1 class="text-2xl font-black text-slate-800">設備借用系統</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">請填寫基本資料以開始預約</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-slate-500 text-xs font-black mb-2 uppercase tracking-widest">學生姓名</label>
                <input type="text" id="studentName" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none transition" 
                    placeholder="例如：王小明">
            </div>

            <div>
                <label class="block text-slate-500 text-xs font-black mb-2 uppercase tracking-widest">學生學號</label>
                <input type="text" id="studentId" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none transition font-mono" 
                    placeholder="例如：D1101234">
            </div>

            <div>
                <label class="block text-slate-500 text-xs font-black mb-2 uppercase tracking-widest">所屬單位</label>
                <input type="text" id="studentOrg" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none transition" 
                    placeholder="例如：資管系學會、熱舞社">
            </div>
            
            <button onclick="login()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-200 transition transform active:scale-95 mt-4">
                進入借用系統
            </button>
        </div>

        <div class="mt-8 text-center">
            <p class="text-slate-300 text-xs">© 2026 學生會設備部 版權所有</p>
        </div>
    </div>

    <script>
        function login() {
            const name = document.getElementById('studentName').value.trim();
            const id = document.getElementById('studentId').value.trim();
            const org = document.getElementById('studentOrg').value.trim();

            if(!name || !id || !org) {
                alert("⚠️ 為了方便聯繫，所有欄位都必須填寫喔！");
                return;
            }

            // 存入瀏覽器記憶體
            localStorage.setItem('studentName', name);
            localStorage.setItem('studentId', id);
            localStorage.setItem('studentOrg', org);
            
            // 跳轉到主頁面
            window.location.href = 'student.html';
        }

        // 監聽 Enter 鍵，讓輸入更順手
        document.onkeydown = function(e) {
            if(e.key === "Enter") login();
        };
    </script>
</body>
</html>
