<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備部數位系統 - 學生端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hide { display: none !important; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="glass-panel rounded-2xl p-6 mb-8 flex flex-col md:flex-row justify-between items-start md:items-center shadow-lg">
        <div>
            <h1 class="text-2xl font-bold flex items-center gap-3 text-blue-400">
                <i class="fa-solid fa-box-open"></i> 設備部數位系統
            </h1>
            <p class="text-sm text-gray-400 mt-2" id="userInfo">載入中...</p>
        </div>
        <div class="mt-4 md:mt-0 flex gap-4">
            <button onclick="showProgress()" class="bg-slate-700 hover:bg-slate-600 transition px-5 py-2 rounded-lg font-medium flex items-center gap-2">
                <i class="fa-solid fa-hourglass-half"></i> 申請進度
            </button>
            <button onclick="logout()" class="text-gray-400 hover:text-red-400 transition px-3 py-2">登出</button>
        </div>
    </header>

    <div id="announcementBox" class="hide bg-yellow-900/50 border border-yellow-700 text-yellow-200 p-4 rounded-xl mb-8 flex items-center gap-3">
        <i class="fa-solid fa-bullhorn text-xl"></i>
        <span id="announcementText"></span>
    </div>

    <main>
        <h2 class="text-xl font-semibold mb-6 border-l-4 border-blue-500 pl-3">可借用設備清單</h2>
        
        <div id="loadingStatus" class="text-center text-gray-400 py-10">
            <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i>
            <p>正在與伺服器同步設備資料，請稍候...</p>
        </div>

        <div id="equipGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hide">
            </div>
    </main>

    <button onclick="toggleCart()" class="fixed bottom-8 right-8 bg-blue-600 hover:bg-blue-500 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl transition transform hover:scale-110 z-40">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cartBadge" class="absolute -top-2 -right-2 bg-red-500 text-sm font-bold w-6 h-6 rounded-full flex items-center justify-center hide">0</span>
    </button>

    <div id="cartSidebar" class="fixed top-0 right-0 h-full w-full md:w-96 glass-panel shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800">
            <h3 class="text-xl font-bold"><i class="fa-solid fa-list-check"></i> 借用清單</h3>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="cartItems" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4">
            <p class="text-gray-400 text-center mt-10">清單是空的，快去挑選設備吧！</p>
        </div>
        <div class="p-6 border-t border-slate-700 bg-slate-800">
            <button onclick="submitBorrow()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold text-lg shadow-lg transition">送出借用申請</button>
        </div>
    </div>

    <div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/50 z-30 hide backdrop-blur-sm transition-opacity"></div>

    <script>
        // 🌟 部長，請確認這裡的網址是您 Cloud Run 的真實網址！
        const API_BASE = "https://student-api-174932950003.asia-east1.run.app";
        
        let currentUser = { sid: "", name: "" };
        let equipmentsData = {}; // 存放原始字典
        let cart = {}; // 格式: { "識別帶": 2, "CALL機": 1 }
        
        // 1. 初始化系統 (登入檢查與載入資料)
        window.onload = async () => {
            checkLogin();
            await fetchSettings();
            await fetchEquipments();
        };

        // 檢查是否有登入紀錄，沒有就跳出輸入框
        function checkLogin() {
            let savedSid = localStorage.getItem("student_sid");
            let savedName = localStorage.getItem("student_name");
            
            if (!savedSid || !savedName) {
                Swal.fire({
                    title: '學生登入',
                    html: `
                        <input id="swal-sid" class="swal2-input" placeholder="學號 (例: D11216243)">
                        <input id="swal-name" class="swal2-input" placeholder="姓名 (例: 李友仁)">
                    `,
                    confirmButtonText: '進入系統',
                    allowOutsideClick: false,
                    preConfirm: () => {
                        const sid = document.getElementById('swal-sid').value.trim();
                        const name = document.getElementById('swal-name').value.trim();
                        if (!sid || !name) Swal.showValidationMessage('學號和姓名不能空白！');
                        return { sid, name };
                    }
                }).then((result) => {
                    currentUser = result.value;
                    localStorage.setItem("student_sid", currentUser.sid);
                    localStorage.setItem("student_name", currentUser.name);
                    updateUserUI();
                });
            } else {
                currentUser = { sid: savedSid, name: savedName };
                updateUserUI();
            }
        }

        function updateUserUI() {
            document.getElementById("userInfo").innerHTML = `<i class="fa-solid fa-user"></i> ${currentUser.name} (${currentUser.sid})`;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // 2. 抓取系統設定 (公告、維護模式)
        async function fetchSettings() {
            try {
                let res = await fetch(`${API_BASE}/settings`);
                let settings = await res.json();
                
                if (settings["維護模式"] === "開啟") {
                    Swal.fire({ icon: 'warning', title: '系統維護中', text: '目前暫停借用服務，請稍後再試。', allowOutsideClick: false, showConfirmButton: false });
                }
                if (settings["系統公告"]) {
                    document.getElementById("announcementBox").classList.remove("hide");
                    document.getElementById("announcementText").innerText = settings["系統公告"];
                }
            } catch (e) { console.error("設定檔載入失敗", e); }
        }

        // 3. 🌟 最關鍵的一步：抓取並解析設備清單
        async function fetchEquipments() {
            try {
                let res = await fetch(`${API_BASE}/equipments`);
                equipmentsData = await res.json();
                
                // 檢查是否發生 X光機崩潰
                if (equipmentsData["X光診斷"] || equipmentsData["深層X光"]) {
                    throw new Error(equipmentsData["X光診斷"] || equipmentsData["深層X光"]);
                }

                // 🌟 【破解陣列報錯的秘密武器】：Object.values()
                // 把後端的字典 {"001": {...}, "002": {...}} 變成陣列 [{...}, {...}]
                let equipArray = Object.values(equipmentsData);

                // 隱藏載入中，顯示網格
                document.getElementById("loadingStatus").classList.add("hide");
                const grid = document.getElementById("equipGrid");
                grid.classList.remove("hide");
                grid.innerHTML = "";

                if (equipArray.length === 0) {
                    grid.innerHTML = "<p class='col-span-full text-center text-gray-400'>目前無可借用設備</p>";
                    return;
                }

                // 畫出設備卡片
                equipArray.forEach(item => {
                    let name = item["設備名稱"];
                    let stock = parseInt(item["剩餘數量"]) || 0;
                    let limit = parseInt(item["單次借用上限"]) || 0;
                    
                    if (!name) return; // 跳過空資料
                    
                    let isOutOfStock = stock <= 0;
                    let btnHtml = isOutOfStock 
                        ? `<button disabled class="w-full bg-slate-700 text-gray-500 py-2 rounded-lg cursor-not-allowed">已借空</button>`
                        : `<button onclick="addToCart('${name}', ${limit}, ${stock})" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg transition"><i class="fa-solid fa-plus"></i> 加入清單</button>`;

                    let card = `
                        <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 hover:border-blue-500 transition shadow-lg flex flex-col h-full">
                            <h3 class="text-lg font-bold mb-2">${name}</h3>
                            <div class="flex-1 flex flex-col gap-2 text-sm text-gray-300 mb-4">
                                <div class="flex justify-between bg-slate-700/50 p-2 rounded">
                                    <span>庫存剩餘</span>
                                    <span class="${stock > 0 ? 'text-green-400' : 'text-red-400'} font-bold">${stock}</span>
                                </div>
                                <div class="flex justify-between p-2">
                                    <span>單次上限</span>
                                    <span>${limit}</span>
                                </div>
                            </div>
                            ${btnHtml}
                        </div>
                    `;
                    grid.innerHTML += card;
                });

            } catch (err) {
                document.getElementById("loadingStatus").innerHTML = `
                    <i class="fa-solid fa-triangle-exclamation text-3xl mb-3 text-red-500"></i>
                    <p class="text-red-400">連線失敗或資料異常！</p>
                    <p class="text-sm text-gray-500 mt-2">${err.message}</p>
                `;
            }
        }

        // 4. 購物車邏輯
        function addToCart(name, limit, stock) {
            if (!cart[name]) cart[name] = 0;
            
            if (cart[name] >= limit) {
                Swal.fire({ icon: 'warning', title: '已達上限', text: `【${name}】單次最多只能借 ${limit} 個喔！` });
                return;
            }
            if (cart[name] >= stock) {
                Swal.fire({ icon: 'warning', title: '庫存不足', text: `【${name}】庫存只剩下 ${stock} 個了！` });
                return;
            }

            cart[name]++;
            updateCartUI();
            
            // 提示動畫
            const Toast = Swal.mixin({ toast: true, position: 'bottom-start', showConfirmButton: false, timer: 1500 });
            Toast.fire({ icon: 'success', title: `已加入 ${name}` });
        }

        function removeFromCart(name) {
            delete cart[name];
            updateCartUI();
        }

        function updateCartUI() {
            let totalItems = Object.values(cart).reduce((a, b) => a + b, 0);
            let badge = document.getElementById("cartBadge");
            if (totalItems > 0) {
                badge.innerText = totalItems;
                badge.classList.remove("hide");
            } else {
                badge.classList.add("hide");
            }

            let cartDiv = document.getElementById("cartItems");
            if (totalItems === 0) {
                cartDiv.innerHTML = `<p class="text-gray-400 text-center mt-10">清單是空的，快去挑選設備吧！</p>`;
                return;
            }

            cartDiv.innerHTML = "";
            for (let [name, qty] of Object.entries(cart)) {
                cartDiv.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-700 p-4 rounded-lg">
                        <div class="flex-1">
                            <h4 class="font-bold">${name}</h4>
                            <p class="text-sm text-gray-400">數量: <span class="text-blue-400 font-bold">${qty}</span></p>
                        </div>
                        <button onclick="removeFromCart('${name}')" class="text-red-400 hover:text-red-300 p-2">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
            }
        }

        function toggleCart() {
            document.getElementById("cartSidebar").classList.toggle("translate-x-full");
            document.getElementById("overlay").classList.toggle("hide");
        }

        // 5. 送出借用申請
        async function submitBorrow() {
            let items = Object.entries(cart).map(([name, qty]) => ({ name, qty }));
            if (items.length === 0) return Swal.fire('清單是空的', '請先加入設備', 'info');

            Swal.fire({
                title: '送出中...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                let res = await fetch(`${API_BASE}/borrow_batch`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "租借人員學號": currentUser.sid,
                        "租借人員姓名": currentUser.name,
                        "設備清單": items
                    })
                });
                
                let result = await res.json();
                if (result.成功) {
                    Swal.fire('申請成功！', '幹部審核後即可領取設備', 'success');
                    cart = {};
                    updateCartUI();
                    toggleCart();
                    fetchEquipments(); // 重新抓取最新庫存
                } else {
                    Swal.fire('申請失敗', result.訊息 || '伺服器發生錯誤', 'error');
                }
            } catch (err) {
                Swal.fire('連線失敗', '無法連接到伺服器', 'error');
            }
        }

        // 6. 查詢個人申請進度
        async function showProgress() {
            Swal.fire({ title: '查詢中...', didOpen: () => Swal.showLoading() });
            
            try {
                let res = await fetch(`${API_BASE}/transactions`);
                let logs = await res.json();
                
                // 過濾出這個學生的紀錄
                let myLogs = Object.values(logs).filter(t => String(t["租借人員學號"]).includes(currentUser.sid));
                
                if (myLogs.length === 0) {
                    Swal.fire('尚無紀錄', '您目前沒有任何借用申請。', 'info');
                    return;
                }

                // 建立進度表格 HTML
                let tableHtml = `
                    <div class="overflow-x-auto text-left">
                        <table class="w-full text-sm">
                            <thead class="bg-slate-800 text-gray-300">
                                <tr>
                                    <th class="p-2 rounded-tl-lg">設備</th>
                                    <th class="p-2">借用時間</th>
                                    <th class="p-2 rounded-tr-lg">狀態</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                myLogs.reverse().forEach(t => { // 反轉讓最新的在上面
                    let statusColor = t["狀態"] === "待審核" ? "text-yellow-400" : 
                                      t["狀態"] === "借用中" ? "text-green-400" : 
                                      t["狀態"] === "已歸還" ? "text-gray-500" : "text-red-400";
                    tableHtml += `
                        <tr class="border-b border-slate-700">
                            <td class="p-2 font-medium">${t["設備名稱"]}</td>
                            <td class="p-2 text-gray-400">${t["借用時間"].split(' ')[0]}</td>
                            <td class="p-2 font-bold ${statusColor}">${t["狀態"]}</td>
                        </tr>
                    `;
                });
                tableHtml += `</tbody></table></div>`;

                Swal.fire({
                    title: '我的申請進度',
                    html: tableHtml,
                    width: '600px',
                    confirmButtonText: '關閉',
                    customClass: { popup: 'bg-slate-900 text-white' }
                });

            } catch (err) {
                Swal.fire('連線失敗', '無法取得進度資料', 'error');
            }
        }
    </script>
</body>
</html>
