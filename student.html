<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備借用系統 - 數位服務</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .drawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-900 pb-24">

    <div class="max-w-5xl mx-auto px-4 py-6">
        
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-lg md:text-xl font-black text-slate-800 tracking-tight flex items-center">
                    <span class="bg-blue-600 text-white p-2 rounded-xl mr-3 shadow-sm text-sm">📦</span>
                    設備部數位系統
                </h1>
                <p id="userInfo" class="text-[10px] md:text-xs font-bold text-slate-400 mt-1 uppercase tracking-widest ml-12">Loading...</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleStatusDrawer()" class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-4 py-2 rounded-xl text-xs font-black text-slate-600 hover:bg-slate-100 transition shadow-sm active:scale-95">
                    ⏳ 申請進度
                </button>
                <button onclick="logout()" class="text-xs font-bold text-slate-400 hover:text-rose-500 transition hidden md:block">登出</button>
            </div>
        </header>

        <section>
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4 px-2 flex items-center">
                <span class="mr-2">🔎</span> 可借用設備清單
            </h2>
            <div id="equipmentList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </section>

    </div>

    <button onclick="toggleCartDrawer()" class="fixed bottom-6 right-6 bg-slate-900 text-white p-4 rounded-2xl shadow-2xl transition hover:scale-110 active:scale-95 z-40">
        <span class="text-xl">🛒</span>
        <span id="cartBadge" class="absolute -top-2 -right-2 bg-rose-500 text-[10px] font-black px-2 py-1 rounded-full border-2 border-slate-900 hidden">0</span>
    </button>

    <div id="cartModal" class="fixed inset-0 bg-slate-900/40 hidden z-50 flex justify-end backdrop-blur-sm">
        <div id="cartDrawer" class="drawer bg-white w-full max-w-md h-full shadow-2xl flex flex-col transform translate-x-full">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                <h2 class="text-lg font-black text-slate-800">預約申請夾</h2>
                <button onclick="toggleCartDrawer()" class="text-slate-400 hover:text-rose-500 text-3xl font-light">&times;</button>
            </div>
            <div id="cartItems" class="p-6 flex-1 overflow-y-auto space-y-4 no-scrollbar text-sm"></div>
            <div class="p-6 border-t bg-white">
                <button onclick="submitCheckout()" id="checkoutBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-100 transition disabled:bg-slate-200 disabled:shadow-none uppercase tracking-widest text-xs">
                    送出借用申請
                </button>
            </div>
        </div>
    </div>

    <div id="statusModal" class="fixed inset-0 bg-slate-900/40 hidden z-50 flex justify-end backdrop-blur-sm">
        <div id="statusDrawer" class="drawer bg-white w-full max-w-md h-full shadow-2xl flex flex-col transform translate-x-full">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                <h2 class="text-lg font-black text-slate-800">我的申請進度</h2>
                <button onclick="toggleStatusDrawer()" class="text-slate-400 hover:text-rose-500 text-3xl font-light">&times;</button>
            </div>
            <div class="p-4 bg-blue-50/50 border-b border-blue-100 flex justify-center">
                <button onclick="fetchMyStatus()" class="text-xs font-black text-blue-600 bg-white px-4 py-2 rounded-xl shadow-sm hover:shadow-md transition flex items-center gap-2 border border-blue-100">
                    🔄 重新整理進度
                </button>
            </div>
            <div id="statusList" class="p-6 flex-1 overflow-y-auto space-y-4 no-scrollbar">
                </div>
        </div>
    </div>

    <script>
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";
        let cart = [];

        window.onload = function() {
            const name = localStorage.getItem('studentName'), id = localStorage.getItem('studentId'), org = localStorage.getItem('studentOrg'), phone = localStorage.getItem('studentPhone');
            if(name && id && org && phone) {
                document.getElementById('userInfo').innerText = `${name} (${id}) / ${org}`;
            } else { window.location.href = 'index.html'; return; }
            loadEquipments(); loadCartFromStorage();
        };

        // --- 載入設備 ---
        // --- 載入設備 ---
        function loadEquipments() {
            fetch(`${API_URL}/equipments`).then(res => res.json()).then(data => {
                const container = document.getElementById('equipmentList');
                container.innerHTML = '';
                for (const key in data) {
                    const item = data[key];
                    
                    // 🌟 關鍵修正：對齊試算表的標題名稱「單次借用上限」，並加上數字轉換與防呆機制
                    const limit = parseInt(item['單次借用上限']) || parseInt(item['借用上限']) || 1; 
                    const stock = parseInt(item['剩餘數量']) || 0;
                    
                    // 計算下拉選單的最大值 (庫存跟上限，取比較小的那個)
                    const realMax = Math.min(stock, limit);
                    
                    // 產生下拉選單選項
                    let options = realMax > 0 
                        ? Array.from({length: realMax}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('') 
                        : `<option value="0">已領完</option>`;
                    
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-between hover:border-blue-200 hover:shadow-md transition h-full">
                            <div class="mb-4">
                                <h3 class="text-sm font-black text-slate-800 leading-snug">${item['設備名稱']}</h3>
                                <p class="text-[11px] text-slate-400 mt-1">可用庫存 <span class="${stock > 0 ? 'text-blue-500' : 'text-rose-400'} font-bold">${stock}</span></p>
                            </div>
                            <div class="flex items-center gap-2 mt-auto">
                                <select id="qty-${key}" class="bg-slate-50 text-xs font-bold p-2.5 rounded-xl outline-none border border-slate-100 flex-1">${options}</select>
                                <button onclick="addToCart('${key}', '${item['設備名稱']}', ${limit}, ${stock})" 
                                    class="bg-slate-900 text-white text-[10px] font-black px-4 py-3 rounded-xl transition active:scale-95 disabled:bg-slate-100 disabled:text-slate-300"
                                    ${stock <= 0 ? 'disabled' : ''}>+ 加入</button>
                            </div>
                        </div>`;
                }
            });
        }

        // --- 抽屜控制 ---
        function toggleCartDrawer() {
            const m = document.getElementById('cartModal'), d = document.getElementById('cartDrawer');
            if(m.classList.contains('hidden')) { m.classList.remove('hidden'); setTimeout(() => d.classList.remove('translate-x-full'), 10); }
            else { d.classList.add('translate-x-full'); setTimeout(() => m.classList.add('hidden'), 300); }
        }

        function toggleStatusDrawer() {
            const m = document.getElementById('statusModal'), d = document.getElementById('statusDrawer');
            if(m.classList.contains('hidden')) { 
                m.classList.remove('hidden'); setTimeout(() => d.classList.remove('translate-x-full'), 10);
                fetchMyStatus(); // 開啟時自動抓最新進度
            }
            else { d.classList.add('translate-x-full'); setTimeout(() => m.classList.add('hidden'), 300); }
        }

        // --- 進度查詢 ---
       // --- 進度查詢 ---
        function fetchMyStatus() {
            const sid = localStorage.getItem('studentId');
            const list = document.getElementById('statusList');
            list.innerHTML = '<div class="text-center py-10 text-slate-400 font-bold animate-pulse">📡 讀取中...</div>';
            
            fetch(`${API_URL}/transactions`).then(res => res.json()).then(data => {
                // 🌟 核心修改：只抓取該學生的紀錄，並且過濾掉「已歸還」與「已駁回」
                // 🌟 改為正序 (a - b)
                const myItems = Object.values(data)
                    .filter(t => t.租借人員學號 === sid && t.狀態 !== "已歸還" && t.狀態 !== "已駁回")
                    .sort((a, b) => a.交易編號 - b.交易編號);

                if (myItems.length > 0) {
                    list.innerHTML = '';
                    myItems.forEach(t => {
                        const isPending = t.狀態 === "待審核";
                        const theme = isPending ? "border-amber-100 bg-amber-50/40" : "border-blue-100 bg-blue-50/40";
                        const tag = isPending ? "bg-amber-100 text-amber-700" : "bg-blue-100 text-blue-700";
                        const icon = isPending ? '<span class="animate-pulse">⏳</span>' : '📦';
                        
                        list.innerHTML += `
                            <div class="flex items-center justify-between p-4 rounded-2xl border ${theme}">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-[13px] font-black text-slate-800">${t.設備名稱}</span>
                                        <span class="text-[9px] font-black px-2 py-0.5 rounded-md ${tag} uppercase tracking-tighter">${t.狀態}</span>
                                    </div>
                                    <div class="text-[10px] text-slate-400 font-medium font-mono tracking-tight">ID: #${t.交易編號}</div>
                                </div>
                                <div class="text-xl">${icon}</div>
                            </div>`;
                    });
                } else { 
                    list.innerHTML = `<div class="text-center py-10 text-slate-300 italic font-bold">目前沒有進行中的借用</div>`; 
                }
            });
        }
        // --- 購物車與結帳 ---
        function addToCart(id, name, limit, stock) {
            const qty = parseInt(document.getElementById(`qty-${id}`).value);
            const idx = cart.findIndex(i => i.id === id);
            const total = (idx !== -1 ? cart[idx].qty : 0) + qty;
            if(total > limit || total > stock) return alert("超過申請上限或庫存不足！");
            if(idx !== -1) cart[idx].qty = total; else cart.push({ id, name, qty });
            saveCartToStorage(); updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cartBadge'), items = document.getElementById('cartItems'), btn = document.getElementById('checkoutBtn');
            badge.innerText = cart.length; cart.length > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
            btn.disabled = cart.length === 0;
            items.innerHTML = cart.length === 0 ? `<div class="text-center py-10 text-slate-300 italic font-bold">清單目前是空的</div>` : '';
            cart.forEach(item => {
                items.innerHTML += `
                    <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                        <div class="flex-1">
                            <p class="font-bold text-slate-800 text-[13px]">${item.name}</p>
                            <div class="flex items-center mt-2 bg-slate-50 w-fit rounded-lg p-1 border border-slate-100">
                                <button onclick="updateCartItemQty('${item.id}', -1)" class="w-6 h-6 bg-white rounded shadow-sm text-rose-500 font-bold">-</button>
                                <span class="px-3 font-mono font-bold text-xs">${item.qty}</span>
                                <button onclick="updateCartItemQty('${item.id}', 1)" class="w-6 h-6 bg-white rounded shadow-sm text-blue-500 font-bold">+</button>
                            </div>
                        </div>
                        <button onclick="cart.splice(cart.findIndex(i=>i.id==='${item.id}'),1);saveCartToStorage();updateCartUI();" class="text-slate-300 hover:text-rose-500 text-[10px] font-black uppercase ml-4 p-2">移除</button>
                    </div>`;
            });
        }

        function submitCheckout() {
            const sid = localStorage.getItem('studentId'), sname = localStorage.getItem('studentName'), sorg = localStorage.getItem('studentOrg'), sphone = localStorage.getItem('studentPhone');
            const btn = document.getElementById('checkoutBtn');
            btn.innerText = "⏳ 傳送中..."; btn.disabled = true;
            fetch(`${API_URL}/borrow_batch`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "租借人員學號": sid, "租借人員姓名": `${sname} (${sorg}) - ${sphone}`, "設備清單": cart })
            }).then(res => res.json()).then(data => {
                if(data.成功) { 
                    alert("✅ 申請成功！"); 
                    cart = []; saveCartToStorage(); updateCartUI(); toggleCartDrawer(); loadEquipments(); 
                    setTimeout(() => toggleStatusDrawer(), 500); // 送出後自動打開進度給他看
                } else alert("❌ 失敗：" + data.訊息);
            }).finally(() => { btn.innerText = "送出借用申請"; btn.disabled = false; });
        }

        function updateCartItemQty(id, change) {
            const idx = cart.findIndex(i => i.id === id);
            if(idx === -1) return;
            const next = cart[idx].qty + change;
            if(next <= 0) { if(confirm("移除此項？")) cart.splice(idx, 1); } else cart[idx].qty = next;
            saveCartToStorage(); updateCartUI();
        }

        function saveCartToStorage() { localStorage.setItem('shoppingCart', JSON.stringify(cart)); }
        function loadCartFromStorage() { const s = localStorage.getItem('shoppingCart'); if(s) { cart = JSON.parse(s); updateCartUI(); } }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
